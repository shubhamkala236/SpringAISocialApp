server:
  port: 8083

spring:
  application:
    name: post-service

  datasource:
    url: jdbc:postgresql://localhost:5432/postdb
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

jwt:
  secret: f7e2c9a14b8d3f6e0a5c8b2d9e4f1a7c3b6d8e0f2a4c6b8d0e2f4a6c8b0d2e4f
  issuer: SocialApp
  audience: SocialApp
  expiration-days: 7

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:your-cloud-name}
  api-key: ${CLOUDINARY_API_KEY:your-api-key}
  api-secret: ${CLOUDINARY_API_SECRET:your-api-secret}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html